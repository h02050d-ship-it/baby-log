<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="育児記録">
<meta name="theme-color" content="#ff9eb5">
<title>育児記録</title>
<style>
  :root{
    --bg:#fff5f7; --card:#ffffff; --line:#ffe0e8;
    --ink:#3a3236; --sub:#9b8f93; --pink:#ff8aa6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--ink);
    padding:0; max-width:560px; margin:0 auto;
    height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden;
  }
  header{
    flex:none;
    background:linear-gradient(135deg,#ff9eb5,#ffb6a3);
    color:#fff; padding:14px 18px 12px; text-align:center;
    box-shadow:0 2px 10px rgba(255,158,181,.35);
  }
  header h1{margin:0; font-size:19px; letter-spacing:.05em;}
  header .date{font-size:12px; opacity:.92; margin-top:3px;}

  .timers{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px 14px 4px;}
  .timer{
    background:var(--card); border-radius:16px; padding:11px 13px;
    box-shadow:0 2px 8px rgba(0,0,0,.05); border:1px solid var(--line);
    display:flex; flex-direction:column; gap:2px;
  }
  .timer .lbl{font-size:13px; color:var(--sub); display:flex; align-items:center; gap:6px;}
  .timer .dot{width:10px; height:10px; border-radius:50%; flex:none;}
  .timer .since{font-size:21px; font-weight:700; line-height:1.15;}
  .timer .last{font-size:11px; color:var(--sub);}

  .pad{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:6px 14px 8px; touch-action:pan-y; max-height:46vh; overflow-y:auto;}
  .btn{
    position:relative; border:none; border-radius:18px; padding:20px 8px;
    font-size:18px; font-weight:700; cursor:pointer; transition:transform .08s, box-shadow .08s;
    box-shadow:0 4px 0 rgba(0,0,0,.16); display:flex; flex-direction:column; align-items:center; gap:6px;
    touch-action:pan-y; user-select:none; -webkit-user-select:none;
  }
  .btn .emo{font-size:30px; line-height:1;}
  .btn .nm{font-size:17px;}
  .btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.16);}
  .btn.dragging{transform:scale(1.07); box-shadow:0 10px 20px rgba(0,0,0,.28); opacity:.95; z-index:5;}
  .btn .badge{position:absolute; top:6px; right:8px; font-size:16px; background:rgba(255,255,255,.85); border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center;}
  .btn.addtile{background:#fff; color:var(--sub); border:2px dashed #ffc2d2; box-shadow:none; font-size:16px; font-weight:600;}
  .btn.addtile:active{transform:none;}

  .tools{display:flex; justify-content:center; gap:14px; padding:4px 0 0;}
  .tools button{background:none; border:none; color:var(--sub); font-size:13px; cursor:pointer; padding:6px 10px; border-radius:10px;}
  .tools button.on{background:#ffe0e8; color:var(--pink); font-weight:700;}
  .hint{text-align:center; font-size:11px; color:var(--sub); padding:0 0 2px;}

  .bottom{flex:none; background:var(--bg); border-top:1px solid var(--line); box-shadow:0 -2px 10px rgba(0,0,0,.04); padding-bottom:calc(2px + env(safe-area-inset-bottom));}
  .log{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; min-height:0; padding:8px 14px 12px;}
  .day{font-size:13px; color:#c79; font-weight:700; margin:16px 4px 6px;}
  .item{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:11px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px;
    box-shadow:0 1px 4px rgba(0,0,0,.04);
  }
  .item .ic{font-size:24px; width:34px; text-align:center;}
  .item .main{flex:1; min-width:0;}
  .item .t1{font-size:15px; font-weight:600;}
  .item .t2{font-size:12px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item .time{font-size:15px; font-weight:700; white-space:nowrap;}
  .item .del{background:none; border:none; color:#ccc; font-size:20px; padding:4px 6px; cursor:pointer;}
  .empty{text-align:center; color:var(--sub); padding:40px 20px; font-size:14px;}

  .mask{position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:flex-end; z-index:50;}
  .mask.on{display:flex;}
  .sheet{
    background:#fff; width:100%; max-width:560px; margin:0 auto; border-radius:22px 22px 0 0;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom)); animation:up .2s ease; max-height:92vh; overflow:auto;
  }
  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet h3{margin:0 0 14px; font-size:17px; text-align:center;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:13px; color:var(--sub); margin-bottom:5px;}
  .field input,.field select,.field textarea{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px;
    font-size:16px; font-family:inherit; background:#fffafc; -webkit-appearance:none; appearance:none;
  }
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%23bbb' stroke-width='2' fill='none'/></svg>"); background-repeat:no-repeat; background-position:right 14px center;}
  .field textarea{resize:none; height:60px;}
  .lastline{font-size:13px; color:var(--pink); background:#fff0f4; border-radius:10px; padding:9px 12px; margin-bottom:14px; text-align:center; font-weight:600;}
  .chips{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{border:1.5px solid var(--line); background:#fffafc; border-radius:20px; padding:8px 12px; font-size:18px; cursor:pointer; line-height:1;}
  .chip.sel{outline:3px solid var(--pink); outline-offset:1px;}
  .swatch{width:38px; height:38px; border-radius:50%; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1.5px var(--line);}
  .swatch.sel{box-shadow:0 0 0 3px var(--pink);}
  .tchip{border:1.5px solid var(--line); background:#fffafc; border-radius:22px; padding:11px 18px; font-size:15px; cursor:pointer;}
  .tchip.sel{background:var(--pink); color:#fff; border-color:var(--pink);}
  .cchip{width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1.5px var(--line);}
  .cchip.sel{box-shadow:0 0 0 3px var(--pink);}
  .grp{display:flex; flex-direction:column; gap:6px; background:#fff7fa; border:1px solid var(--line); border-radius:12px; padding:10px; margin-bottom:8px;}
  .grp .grow{display:flex; gap:6px; align-items:center;}
  .grp input{margin:0;}
  .grp .rm{flex:none; width:auto; padding:8px 10px; background:#fff; border:1.5px solid #ffd0dd; color:#e06; border-radius:10px; font-size:13px; cursor:pointer;}
  .addgrp{width:100%; padding:11px; background:#fff; border:1.5px dashed #ffc2d2; color:var(--pink); border-radius:12px; font-size:14px; font-weight:600; cursor:pointer;}
  .row{display:flex; align-items:center; gap:10px;}
  .toggle{display:flex; align-items:center; justify-content:space-between; padding:10px 2px; font-size:15px;}
  .toggle input{width:auto; transform:scale(1.3);}
  .save{width:100%; padding:15px; border:none; border-radius:14px; background:var(--pink); color:#fff; font-size:17px; font-weight:700; cursor:pointer; margin-top:4px;}
  .danger{width:100%; padding:12px; border:none; border-radius:12px; background:#fff; color:#e06; font-size:14px; cursor:pointer; margin-top:8px; border:1.5px solid #ffd0dd;}
  .cancel{width:100%; padding:12px; border:none; background:none; color:var(--sub); font-size:14px; margin-top:6px; cursor:pointer;}
  .preview{display:flex; justify-content:center; margin-bottom:14px;}
  .preview .btn{width:140px;}

  header .prof{cursor:pointer;}
  header .pname{font-size:18px; font-weight:700; letter-spacing:.04em;}
  header .page{font-size:12px; opacity:.92; margin-top:2px;}

  .datebar{flex:none; display:flex; align-items:center; justify-content:space-between; padding:8px 14px 2px; gap:8px;}
  .navbtn{border:none; background:#fff; color:var(--pink); width:40px; height:40px; border-radius:12px; font-size:24px; line-height:1; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.06); flex:none;}
  .datewrap{text-align:center; cursor:pointer; flex:1;}
  .datelbl{font-size:16px; font-weight:700;}
  .datesub{font-size:11px; color:var(--pink); margin-top:1px; height:14px;}

  .summary{flex:none; display:flex; gap:8px; padding:8px 14px 4px; overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .scard{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:9px 11px; box-shadow:0 1px 5px rgba(0,0,0,.05); min-width:96px; flex:none;}
  .scard .sh{display:flex; align-items:center; gap:5px; font-size:12px; color:var(--sub);}
  .scard .sh .dot{width:9px; height:9px; border-radius:50%; flex:none;}
  .scard .snum{font-size:17px; font-weight:700; margin-top:2px;}
  .scard .ssub{font-size:10px; color:var(--sub); margin-top:1px; white-space:nowrap;}
</style>
</head>
<body>
<header>
  <div class="prof" id="prof" onclick="openProfile()">
    <div class="pname" id="pName">🍼 育児記録</div>
    <div class="page" id="pAge">タップで名前・誕生日を設定</div>
  </div>
</header>

<div class="datebar">
  <button class="navbtn" id="dPrev">‹</button>
  <div class="datewrap" onclick="goToday()">
    <div class="datelbl" id="dLabel"></div>
    <div class="datesub" id="dToday">今日に移動</div>
  </div>
  <button class="navbtn" id="dNext">›</button>
</div>

<div class="summary" id="timers"></div>

<div class="log" id="log"></div>

<div class="bottom">
  <div class="hint" id="syncStatus" style="display:none;"></div>
  <div class="tools">
    <button id="editToggle">✏️ 項目を編集</button>
    <button id="syncBtn">🔗 夫婦で共有</button>
  </div>
  <div class="hint" id="hint">長押しで並べ替え</div>
  <div class="pad" id="pad"></div>
</div>

<!-- 記録モーダル -->
<div class="mask" id="recMask">
  <div class="sheet">
    <h3 id="recTitle"></h3>
    <div class="lastline" id="lastMilkLine"></div>
    <div class="field">
      <label>いつ</label>
      <select id="f_when"></select>
      <input type="datetime-local" id="f_time" style="display:none; margin-top:8px;">
    </div>
    <div class="field" id="amountField" style="display:none;">
      <label>量（ml）</label>
      <select id="f_amount_sel"></select>
      <input type="number" id="f_amount_num" inputmode="numeric" placeholder="ml を入力" style="display:none; margin-top:8px;">
    </div>
    <div id="tagsArea" style="display:none;"></div>
    <div class="toggle" id="alsoPeeField" style="display:none;"><span>おしっこも記録する</span><input type="checkbox" id="f_alsoPee"></div>
    <div class="field" id="memoField" style="display:none;">
      <label id="memoLabel">メモ</label>
      <textarea id="f_memo" placeholder=""></textarea>
    </div>
    <button class="save" onclick="saveRecord()">記録する</button>
    <button class="cancel" onclick="closeRec()">キャンセル</button>
  </div>
</div>

<!-- 項目の追加・編集モーダル -->
<div class="mask" id="itemMask">
  <div class="sheet">
    <h3 id="itemTitle">項目を追加</h3>
    <div class="preview"><div class="btn" id="itemPreview"><span class="emo" id="pvIcon">⭐</span><span class="nm" id="pvName">新しい項目</span></div></div>
    <div class="field">
      <label>名前</label>
      <input id="i_name" maxlength="8" placeholder="例：おくすり" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>アイコン（絵文字）</label>
      <div class="chips" id="iconChips"></div>
      <input id="i_icon" maxlength="4" placeholder="好きな絵文字を入力" style="margin-top:8px;" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>背景色</label>
      <div class="chips" id="colorChips" style="margin-bottom:8px;"></div>
      <div class="row"><span style="font-size:13px;color:var(--sub)">自由に選ぶ：</span><input type="color" id="i_color" value="#5bc0de" style="width:54px;height:38px;padding:2px;" oninput="pickColor(this.value)"></div>
    </div>
    <div class="field">
      <label>選択ボタン（任意）</label>
      <div id="tagGroups"></div>
      <button type="button" class="addgrp" onclick="addTagGroup()">＋ 選択グループを追加</button>
      <div style="font-size:11px;color:var(--sub);margin-top:6px;">例）グループ名「色」＋選択肢「黄, 緑, 茶」と入れると、記録のときボタンで選べます</div>
    </div>
    <div class="toggle"><span>量（ml）を記録する</span><input type="checkbox" id="i_amount"></div>
    <div class="toggle"><span>メモを記録する</span><input type="checkbox" id="i_memo" checked></div>
    <button class="save" onclick="saveItem()">保存</button>
    <button class="danger" id="i_delete" style="display:none;" onclick="deleteItem()">この項目を削除</button>
    <button class="cancel" onclick="closeItem()">キャンセル</button>
  </div>
</div>

<!-- 共有設定モーダル -->
<div class="mask" id="syncMask">
  <div class="sheet">
    <h3>🔗 夫婦で共有</h3>
    <div style="font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:14px;">
      同じ<b>合言葉</b>を2人のスマホに入れると、記録が自動で同期されます。<br>
      ※この画面のURLと合言葉は、外の人に教えないでください。
    </div>
    <div class="field">
      <label>同期アドレス（URL）</label>
      <input id="s_url" placeholder="https://script.google.com/macros/s/..../exec">
    </div>
    <div class="field">
      <label>合言葉（夫婦で同じものを入力）</label>
      <input id="s_pass" placeholder="例：わが家のあいことば">
    </div>
    <button class="save" onclick="connectSync()">つなぐ・同期する</button>
    <div id="s_msg" style="text-align:center;font-size:13px;margin-top:12px;min-height:18px;"></div>
    <button class="danger" id="s_off" style="display:none;" onclick="disconnectSync()">共有をやめる（この端末だけにする）</button>
    <button class="cancel" onclick="closeSync()">閉じる</button>
  </div>
</div>

<!-- プロフィール設定モーダル -->
<div class="mask" id="profMask">
  <div class="sheet">
    <h3>👶 赤ちゃんの情報</h3>
    <div class="field">
      <label>名前</label>
      <input id="p_name_in" maxlength="12" placeholder="例：栞音">
    </div>
    <div class="field">
      <label>誕生日</label>
      <input type="date" id="p_birth_in">
    </div>
    <button class="save" onclick="saveProfile()">保存</button>
    <button class="cancel" onclick="closeProfile()">キャンセル</button>
  </div>
</div>

<script>
const REC_KEY='baby_tracker_v1';
const CFG_KEY='baby_tracker_items_v1';
const COLOR_NAME_MAP={'黄':'#f3d250','緑':'#7cc47c','茶':'#a0744b','赤':'#e8553e','黒':'#444','白':'#ffffff','オレンジ':'#f0ad4e','こげ茶':'#7a4a25'};
const DEFAULT_CFG=[
  {id:'milk', name:'ミルク',   icon:'🍼', color:'#5bc0de', amount:true,  memo:false,
    tags:[{label:'中身', options:['ミルク','母乳']}]},
  {id:'food', name:'離乳食',   icon:'🍚', color:'#f0ad4e', amount:false, memo:true},
  {id:'poop', name:'うんち',   icon:'💩', color:'#a0744b', amount:false, memo:true, alsoPee:true,
    tags:[
      {label:'色', options:['黄','緑','茶','赤','黒','白'], colors:COLOR_NAME_MAP},
      {label:'形状', options:['水っぽい','ゆるい','やわらかい','かたい']},
    ]},
  {id:'pee',  name:'おしっこ', icon:'💧', color:'#f3d250', amount:false, memo:true},
];
const ICON_PRESETS=['🍼','🥛','🍚','🍴','💩','💧','😴','💤','🌡️','💊','🛁','👶','🤱','🧷','⏰','📏','⚖️','🚼','☀️','🌙'];
const COLOR_PRESETS=['#5bc0de','#f0ad4e','#a0744b','#f3d250','#7cc47c','#b692e8','#ff9eb5','#7e9bd4','#e8918c','#5cc7b5'];
const ML_BASE=[20,40,60,80,100,120,140,160,180,200,220,240,260,280,300];
const TIME_OPTS=[['0','今'],['5','5分前'],['10','10分前'],['15','15分前'],['20','20分前'],['30','30分前'],['45','45分前'],['60','1時間前'],['90','1時間半前'],['120','2時間前'],['180','3時間前'],['manual','日時を指定…']];

const SYNC_KEY='baby_tracker_sync_v1';
const DEFAULT_SYNC_URL='https://script.google.com/macros/s/AKfycbyIwhBPGpfCWRiTnhpaXYDIlpGD3WAzHLOEIz94iS5eKbvB4KvtJWlamtW-K7OoWCdKJQ/exec';
let data=loadJSON(REC_KEY,[]);
let cfg=loadJSON(CFG_KEY,null)||DEFAULT_CFG.map(x=>({...x}));
let cfgUpdated=loadJSON('baby_tracker_cfg_updated',0)||0;
let cfgDirty=false;
let sync=loadJSON(SYNC_KEY,{url:'',pass:'',since:0,last:0});
let editMode=false;
let recEditId=null, recType=null, recTagsSel={};
let itemEditId=null, formTags=[];

// 既存データに同期用フィールドを補完
data.forEach(d=>{ if(d.updated==null) d.updated=d.ts||Date.now(); if(d.deleted==null) d.deleted=false; d._dirty=!!d._dirty; });

function loadJSON(k,def){ try{ const v=JSON.parse(localStorage.getItem(k)); return v==null?def:v; }catch(e){ return def; } }
function saveRec(){ localStorage.setItem(REC_KEY, JSON.stringify(data)); }
function saveCfg(){ localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); cfgUpdated=Date.now(); cfgDirty=true; localStorage.setItem('baby_tracker_cfg_updated', JSON.stringify(cfgUpdated)); }
function saveSync(){ localStorage.setItem(SYNC_KEY, JSON.stringify(sync)); }
function live(){ return data.filter(d=>!d.deleted); }
function uid(p){ return (p||'')+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function cfgOf(id){ return cfg.find(c=>c.id==id) || {id, name:'(削除済)', icon:'❔', color:'#ccc'}; }

// ---- 表示整形 ----
function pad(n){ return n<10?'0'+n:''+n; }
function fmtSince(ms){
  if(ms<0) ms=0;
  const m=Math.floor(ms/60000), h=Math.floor(m/60), mm=m%60;
  if(h>=24){ return Math.floor(h/24)+'日前'; }
  if(h>0) return h+'時間'+(mm>0?mm+'分':'');
  return m+'分';
}
function fmtClock(ts){ const d=new Date(ts); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function fmtDay(ts){
  const d=new Date(ts), t=new Date();
  const same=(a,b)=>a.getFullYear()==b.getFullYear()&&a.getMonth()==b.getMonth()&&a.getDate()==b.getDate();
  const y=new Date(t); y.setDate(t.getDate()-1);
  const w=['日','月','火','水','木','金','土'][d.getDay()];
  if(same(d,t)) return '今日';
  if(same(d,y)) return '昨日';
  return (d.getMonth()+1)+'月'+d.getDate()+'日('+w+')';
}
function escapeHtml(s){ return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function textColor(hex){
  try{ const c=hex.replace('#',''); const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
    return ((r*299+g*587+b*114)/1000)>=150 ? '#5a4a1f' : '#fff'; }catch(e){ return '#fff'; }
}
function lastOf(id){ return live().filter(d=>d.type==id).sort((a,b)=>b.ts-a.ts)[0]; }
function lastAmount(id){ const r=live().filter(d=>d.type==id&&d.amount).sort((a,b)=>b.ts-a.ts)[0]; return r?r.amount:null; }

// ---- 日付関連 ----
let selDate = startOfDay(Date.now());
function startOfDay(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function sameDay(a,b){ return startOfDay(a)===startOfDay(b); }
function isToday(){ return selDate===startOfDay(Date.now()); }
function dayRecords(){ return live().filter(d=>sameDay(d.ts, selDate)).sort((a,b)=>a.ts-b.ts); }

function renderDateBar(){
  const d=new Date(selDate); const w=['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('dLabel').textContent = isToday() ? `今日 ${d.getMonth()+1}/${d.getDate()}(${w})` : `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${w})`;
  document.getElementById('dToday').style.visibility = isToday()?'hidden':'visible';
  document.getElementById('dNext').style.visibility = isToday()?'hidden':'visible';
}

function calcAge(birth){
  if(!birth) return '';
  const b=new Date(birth+'T00:00:00'), n=new Date();
  if(isNaN(b)) return '';
  let months=(n.getFullYear()-b.getFullYear())*12 + (n.getMonth()-b.getMonth());
  let days=n.getDate()-b.getDate();
  if(days<0){ months--; const pm=new Date(n.getFullYear(),n.getMonth(),0).getDate(); days+=pm; }
  const years=Math.floor(months/12); months=months%12;
  return `${years}歳${months}ヶ月${days}日`;
}

// ============ 並べ替え（長押しドラッグ）＋タップ ============
const padEl=document.getElementById('pad');
let drag=null;
padEl.addEventListener('pointerdown',e=>{
  const add=e.target.closest('[data-add]');
  if(add){ drag={add:true}; return; }
  const tile=e.target.closest('[data-id]');
  if(!tile) return;
  drag={ id:tile.getAttribute('data-id'), el:tile, sx:e.clientX, sy:e.clientY, pid:e.pointerId, active:false, moved:false, timer:null };
  drag.timer=setTimeout(()=>{
    if(!drag) return;
    drag.active=true;
    drag.el.classList.add('dragging');
    try{ padEl.setPointerCapture(drag.pid); }catch(_){}
    if(navigator.vibrate) navigator.vibrate(15);
    drag.el.style.pointerEvents='none';
  },380);
});
padEl.addEventListener('pointermove',e=>{
  if(!drag||drag.add) return;
  if(!drag.active){
    if(Math.abs(e.clientX-drag.sx)>10||Math.abs(e.clientY-drag.sy)>10){ clearTimeout(drag.timer); drag=null; }
    return;
  }
  e.preventDefault();
  const under=document.elementFromPoint(e.clientX,e.clientY);
  const tile=under&&under.closest('[data-id]');
  if(tile&&tile!==drag.el){
    const r=tile.getBoundingClientRect();
    const after=(e.clientY>r.top+r.height/2);
    if(after) tile.after(drag.el); else padEl.insertBefore(drag.el,tile);
  }
},{passive:false});
function endDrag(e){
  if(!drag) return;
  if(drag.add){ drag=null; openAddItem(); return; }
  clearTimeout(drag.timer);
  const d=drag; drag=null;
  if(d.active){
    d.el.classList.remove('dragging'); d.el.style.pointerEvents='';
    try{ padEl.releasePointerCapture(d.pid); }catch(_){}
    if(d.moved){ saveOrder(); return; }
    if(orderChanged()){ saveOrder(); return; }
  }
  if(editMode) openItemEdit(d.id); else openRecord(d.id);
}
padEl.addEventListener('pointerup',endDrag);
padEl.addEventListener('pointercancel',e=>{ if(drag&&drag.timer) clearTimeout(drag.timer); if(drag&&drag.el){ drag.el.classList.remove('dragging'); drag.el.style.pointerEvents=''; } drag=null; });
function currentOrder(){ return [...padEl.querySelectorAll('[data-id]')].map(el=>el.getAttribute('data-id')); }
function orderChanged(){ const ids=currentOrder(); const vis=cfg.filter(c=>!c.hidden).map(c=>c.id); return ids.join(',')!==vis.join(','); }
function saveOrder(){
  const ids=currentOrder();

  const hidden=cfg.filter(c=>c.hidden);
  cfg=[...visible,...hidden]; saveCfg(); renderTimers(); renderPad(); scheduleSync();
}

// ============ 共有・同期 ============
document.getElementById('syncBtn').addEventListener('click',openSync);
function openSync(){
  document.getElementById('s_url').value=sync.url||DEFAULT_SYNC_URL;
  document.getElementById('s_pass').value=sync.pass||'';
  document.getElementById('s_msg').textContent='';
  document.getElementById('s_off').style.display = sync.url?'block':'none';
  document.getElementById('syncMask').classList.add('on');
}
function closeSync(){ document.getElementById('syncMask').classList.remove('on'); }
async function connectSync(){
  const url=document.getElementById('s_url').value.trim();
  const pass=document.getElementById('s_pass').value.trim();
  const msg=document.getElementById('s_msg');
  if(!url||!pass){ msg.style.color='#e06'; msg.textContent='URLと合言葉を両方入れてください'; return; }
  msg.style.color='var(--sub)'; msg.textContent='つないでいます…';
  sync.url=url; sync.pass=pass; sync.since=0;
  // すべての記録・設定を「未送信」にして一斉アップ
  data.forEach(d=>d._dirty=true); cfgDirty=true;
  const ok=await doSync(true);
  if(ok){ msg.style.color='#2a8'; msg.textContent='✓ つながりました！自動で同期します'; saveSync(); updateSyncStatus(); document.getElementById('s_off').style.display='block'; }
  else { msg.style.color='#e06'; msg.textContent='つながりませんでした。URL・合言葉・通信をご確認ください'; }
}
function disconnectSync(){
  if(!confirm('共有をやめますか？\n（この端末の記録は残ります）')) return;
  sync={url:'',pass:'',since:0,last:0}; saveSync(); updateSyncStatus(); closeSync();
}
let syncTimer=null, syncing=false;
function scheduleSync(){ if(!sync.url) return; clearTimeout(syncTimer); syncTimer=setTimeout(()=>doSync(false),1200); }
async function doSync(initial){
  if(!sync.url||!sync.pass||syncing) return false;
  syncing=true; updateSyncStatus('同期中…');
  try{
    const out=data.filter(d=>d._dirty).map(stripRec);
    if(cfgDirty){ out.push({ id:'__config__', type:'__config__', ts:0, amount:null, memo:JSON.stringify(cfg), tags:null, updated:cfgUpdated||Date.now(), deleted:false }); }
    const res=await fetch(sync.url,{ method:'POST', body: JSON.stringify({ pass:sync.pass, since:sync.since||0, records:out }) });
    const j=await res.json();
    if(!j.ok){ updateSyncStatus(j.error=='wrong-pass'?'合言葉が違います':'同期エラー'); syncing=false; return false; }
    // サーバーからの変更を取り込む
    let changed=false;
    for(const r of (j.records||[])){
      if(r.id=='__config__'){
        if(!cfgDirty){ try{ cfg=JSON.parse(r.memo); cfgUpdated=Number(r.updated)||cfgUpdated; localStorage.setItem(CFG_KEY,JSON.stringify(cfg)); localStorage.setItem('baby_tracker_cfg_updated',JSON.stringify(cfgUpdated)); changed=true; }catch(_){} }
        continue;
      }
      const idx=data.findIndex(x=>x.id==r.id);
      const rec={ id:r.id, type:r.type, ts:Number(r.ts), amount:r.amount===''||r.amount==null?null:Number(r.amount), memo:r.memo||'', tags:r.tags||null, updated:Number(r.updated)||0, deleted:!!r.deleted, _dirty:false };
      if(idx>=0) data[idx]=rec; else data.push(rec);
      changed=true;
    }
    // 送信済みフラグを解除
    data.forEach(d=>{ d._dirty=false; });
    cfgDirty=false;
    sync.since=Number(j.serverTime)||sync.since;
    sync.last=Date.now();
    saveRec(); saveSync();
    if(changed) renderAll();
    updateSyncStatus();
    syncing=false; return true;
  }catch(err){ updateSyncStatus('通信できません'); syncing=false; return false; }
}
function stripRec(d){ return { id:d.id, type:d.type, ts:d.ts, amount:d.amount, memo:d.memo, tags:d.tags, updated:d.updated, deleted:!!d.deleted }; }
function updateSyncStatus(tmp){
  const el=document.getElementById('syncStatus');
  const btn=document.getElementById('syncBtn');
  if(!sync.url){ el.style.display='none'; btn.textContent='🔗 夫婦で共有'; return; }
  btn.textContent='🔗 共有中';
  el.style.display='block';
  if(tmp){ el.textContent='🔄 '+tmp; return; }
  el.textContent = sync.last ? ('✓ 最終同期 '+fmtClock(sync.last)) : '✓ 共有中';
}

// ---- 起動 ----
function tick(){
  // 日付が変わっていたら（今日表示中なら）選択日を更新
  if(isToday() && selDate!==startOfDay(Date.now())){ selDate=startOfDay(Date.now()); }
  renderDateBar(); renderTimers();
}
renderProfile(); renderAll(); setInterval(tick,30000); updateSyncStatus();
if(sync.url){ doSync(false); setInterval(()=>{ if(!document.hidden) doSync(false); }, 20000); window.addEventListener('focus',()=>doSync(false)); }
</script>
</body>
