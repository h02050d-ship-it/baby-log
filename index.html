<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="育児記録">
<meta name="theme-color" content="#ff9eb5">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>育児記録</title>
<style>
  :root{
    --bg:#fff5f7; --card:#ffffff; --line:#ffe0e8;
    --ink:#3a3236; --sub:#9b8f93; --pink:#ff8aa6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--ink);
    padding:0; max-width:560px; margin:0 auto;
    height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden;
  }
  header{
    flex:none;
    background:linear-gradient(135deg,#ff9eb5,#ffb6a3);
    color:#fff; padding:14px 14px 12px; text-align:center;
    box-shadow:0 2px 10px rgba(255,158,181,.35);
  }
  .hcenter{cursor:pointer;}
  .hcenter .pname{font-size:18px; font-weight:700;}
  .hcenter .page{font-size:13px; opacity:.96; margin-top:2px;}

  .timers{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px 14px 4px;}
  .timer{
    background:var(--card); border-radius:16px; padding:11px 13px;
    box-shadow:0 2px 8px rgba(0,0,0,.05); border:1px solid var(--line);
    display:flex; flex-direction:column; gap:2px;
  }
  .timer .lbl{font-size:13px; color:var(--sub); display:flex; align-items:center; gap:6px;}
  .timer .dot{width:10px; height:10px; border-radius:50%; flex:none;}
  .timer .since{font-size:21px; font-weight:700; line-height:1.15;}
  .timer .last{font-size:11px; color:var(--sub);}

  .pad{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:6px 14px 8px; touch-action:pan-y; max-height:46vh; overflow-y:auto;}
  .btn{
    position:relative; border:none; border-radius:18px; padding:20px 8px;
    font-size:18px; font-weight:700; cursor:pointer; transition:transform .08s, box-shadow .08s;
    box-shadow:0 6px 16px rgba(0,0,0,.13); display:flex; flex-direction:column; align-items:center; gap:7px;
    touch-action:pan-y; user-select:none; -webkit-user-select:none;
  }
  .btn .emo{font-size:30px; line-height:1; opacity:.95;}
  .btn .nm{font-size:17px;}
  .btn:active{transform:translateY(1px); box-shadow:0 3px 9px rgba(0,0,0,.14);}
  .btn.dragging{box-shadow:0 14px 28px rgba(0,0,0,.3); opacity:.97; z-index:5; transition:box-shadow .15s;}
  /* 編集モードのプルプル（iPhone風） */
  @keyframes jiggle{0%{transform:rotate(-1.1deg)}50%{transform:rotate(1.1deg)}100%{transform:rotate(-1.1deg)}}
  .pad.editing .btn:not(.addtile):not(.dragging){animation:jiggle .32s ease-in-out infinite;}
  .pad.editing .btn:not(.addtile):nth-child(2n){animation-delay:-.16s;}
  .pad.dragging-active .btn{animation:none !important;}
  .btn .badge{position:absolute; top:6px; right:8px; font-size:16px; background:rgba(255,255,255,.85); border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center;}
  .btn.addtile{background:#fff; color:var(--sub); border:2px dashed #ffc2d2; box-shadow:none; font-size:16px; font-weight:600;}
  .btn.addtile:active{transform:none;}

  .tools{display:flex; justify-content:center; gap:14px; padding:4px 0 0;}
  .tools button{background:none; border:none; color:var(--sub); font-size:13px; cursor:pointer; padding:6px 10px; border-radius:10px;}
  .tools button.on{background:#ffe0e8; color:var(--pink); font-weight:700;}
  .hint{text-align:center; font-size:11px; color:var(--sub); padding:0 0 2px;}

  .bottom{flex:none; background:var(--bg); border-top:1px solid var(--line); box-shadow:0 -2px 10px rgba(0,0,0,.04); padding-bottom:calc(2px + env(safe-area-inset-bottom));}
  .log{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; min-height:0; padding:8px 14px 12px;}
  .day{font-size:13px; color:#c79; font-weight:700; margin:16px 4px 6px;}
  .item{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:11px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px;
    box-shadow:0 1px 4px rgba(0,0,0,.04);
    overflow:hidden; transition:opacity .22s ease, transform .22s ease, max-height .26s ease, margin .26s ease, padding .26s ease; max-height:80px;
    animation:itemIn .26s ease;
  }
  @keyframes itemIn{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
  .item.removing{opacity:0; transform:translateX(40px); max-height:0; margin-bottom:0; padding-top:0; padding-bottom:0; border-width:0;}
  .item .ic{font-size:24px; width:34px; text-align:center;}
  .item .main{flex:1; min-width:0;}
  .item .t1{font-size:15px; font-weight:600;}
  .item .t2{font-size:12px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item .time{font-size:15px; font-weight:700; white-space:nowrap;}
  .item .del{background:none; border:none; color:#ccc; font-size:20px; padding:4px 6px; cursor:pointer;}
  .empty{text-align:center; color:var(--sub); padding:40px 20px; font-size:14px;}

  .mask{position:fixed; inset:0; background:rgba(0,0,0,0); display:flex; align-items:flex-end; z-index:50;
    visibility:hidden; pointer-events:none; transition:background .28s ease, visibility 0s linear .3s;}
  .mask.on{background:rgba(0,0,0,.42); visibility:visible; pointer-events:auto; transition:background .28s ease, visibility 0s;}
  .sheet{
    background:#fff; width:100%; max-width:560px; margin:0 auto; border-radius:24px 24px 0 0;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom)); max-height:92vh; overflow:auto;
    transform:translateY(100%); transition:transform .3s cubic-bezier(.22,.85,.25,1);
  }
  .mask.on .sheet{transform:translateY(0);}
  .sheet h3{margin:0 0 14px; font-size:17px; text-align:center;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:13px; color:var(--sub); margin-bottom:5px;}
  .field input,.field select,.field textarea{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px;
    font-size:16px; font-family:inherit; background:#fffafc; -webkit-appearance:none; appearance:none;
  }
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%23bbb' stroke-width='2' fill='none'/></svg>"); background-repeat:no-repeat; background-position:right 14px center;}
  .field textarea{resize:none; height:60px;}
  .lastline{font-size:13px; color:var(--pink); background:#fff0f4; border-radius:10px; padding:9px 12px; margin-bottom:14px; text-align:center; font-weight:600;}
  .dt3{display:flex; gap:8px;}
  .dt3 select{flex:1; min-width:0; text-align:center; padding-left:8px;}
  .dt3 select:first-child{flex:1.7;}
  .chips{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{border:1.5px solid var(--line); background:#fffafc; border-radius:20px; padding:8px 12px; font-size:18px; cursor:pointer; line-height:1;}
  .chip.sel{outline:3px solid var(--pink); outline-offset:1px;}
  .swatch{width:38px; height:38px; border-radius:50%; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1.5px var(--line);}
  .swatch.sel{box-shadow:0 0 0 3px var(--pink);}
  .tchip{border:1.5px solid var(--line); background:#fffafc; border-radius:22px; padding:11px 18px; font-size:15px; cursor:pointer;}
  .tchip.sel{background:var(--pink); color:#fff; border-color:var(--pink);}
  .cchip{width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1.5px var(--line);}
  .cchip.sel{box-shadow:0 0 0 3px var(--pink);}
  .grp{display:flex; flex-direction:column; gap:6px; background:#fff7fa; border:1px solid var(--line); border-radius:12px; padding:10px; margin-bottom:8px;}
  .grp .grow{display:flex; gap:6px; align-items:center;}
  .grp input{margin:0;}
  .grp .rm{flex:none; width:auto; padding:8px 10px; background:#fff; border:1.5px solid #ffd0dd; color:#e06; border-radius:10px; font-size:13px; cursor:pointer;}
  .addgrp{width:100%; padding:11px; background:#fff; border:1.5px dashed #ffc2d2; color:var(--pink); border-radius:12px; font-size:14px; font-weight:600; cursor:pointer;}
  .row{display:flex; align-items:center; gap:10px;}
  .toggle{display:flex; align-items:center; justify-content:space-between; padding:10px 2px; font-size:15px;}
  .toggle input{width:auto; transform:scale(1.3);}
  .save{width:100%; padding:15px; border:none; border-radius:14px; background:var(--pink); color:#fff; font-size:17px; font-weight:700; cursor:pointer; margin-top:4px;}
  .danger{width:100%; padding:12px; border:none; border-radius:12px; background:#fff; color:#e06; font-size:14px; cursor:pointer; margin-top:8px; border:1.5px solid #ffd0dd;}
  .cancel{width:100%; padding:12px; border:none; background:none; color:var(--sub); font-size:14px; margin-top:6px; cursor:pointer;}
  .preview{display:flex; justify-content:center; margin-bottom:14px;}
  .preview .btn{width:140px;}

  .hleft .pname{font-size:17px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .hleft .page{font-size:13px; opacity:.96; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  .datebar{flex:none; display:flex; align-items:center; justify-content:space-between; padding:8px 14px 2px; gap:8px;}
  .navbtn{border:none; background:#fff; color:var(--pink); width:40px; height:40px; border-radius:12px; font-size:24px; line-height:1; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.06); flex:none;}
  .datewrap{text-align:center; cursor:pointer; flex:1;}
  .datelbl{font-size:16px; font-weight:700;}
  .datesub{font-size:11px; color:var(--pink); margin-top:1px; height:14px;}

  .summary{flex:none; display:grid; grid-template-columns:repeat(auto-fit,minmax(74px,1fr)); gap:7px; padding:8px 14px 4px;}
  .scard{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:8px 9px; box-shadow:0 1px 5px rgba(0,0,0,.05); min-width:0; overflow:hidden;}
  .scard .sh{display:flex; align-items:center; gap:4px; font-size:11px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .scard .sh .dot{width:8px; height:8px; border-radius:50%; flex:none;}
  .scard .snum{font-size:16px; font-weight:700; margin-top:2px; white-space:nowrap;}
  .scard .ssub{font-size:10px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
</style>
</head>
<body>
<header>
  <div class="hcenter" id="prof" onclick="openProfile()">
    <div class="pname" id="pName">🍼 育児記録</div>
    <div class="page" id="pAge">タップで名前・誕生日を設定</div>
  </div>
</header>

<div class="datebar">
  <button class="navbtn" id="dPrev">‹</button>
  <div class="datewrap" onclick="goToday()">
    <div class="datelbl" id="dLabel"></div>
    <div class="datesub" id="dToday">今日に移動</div>
  </div>
  <button class="navbtn" id="dNext">›</button>
</div>

<div class="summary" id="timers"></div>

<div class="log" id="log"></div>

<div class="bottom">
  <div class="hint" id="syncStatus" style="display:none;"></div>
  <div class="hint" id="hint">長押しで並べ替え</div>
  <div class="pad" id="pad"></div>
</div>

<!-- 記録モーダル -->
<div class="mask" id="recMask">
  <div class="sheet">
    <h3 id="recTitle"></h3>
    <div class="lastline" id="lastMilkLine"></div>
    <div class="field">
      <label>日時</label>
      <div class="dt3">
        <select id="f_date"></select>
        <select id="f_hour"></select>
        <select id="f_min"></select>
      </div>
    </div>
    <div class="field" id="amountField" style="display:none;">
      <label>量（ml）</label>
      <select id="f_amount_sel"></select>
      <input type="number" id="f_amount_num" inputmode="numeric" placeholder="ml を入力" style="display:none; margin-top:8px;">
    </div>
    <div id="tagsArea" style="display:none;"></div>
    <div class="toggle" id="alsoPeeField" style="display:none;"><span>おしっこも記録する</span><input type="checkbox" id="f_alsoPee"></div>
    <div class="field" id="memoField" style="display:none;">
      <label id="memoLabel">メモ</label>
      <textarea id="f_memo" placeholder=""></textarea>
    </div>
    <button class="save" onclick="saveRecord()">保存</button>
    <button class="cancel" onclick="closeRec()">キャンセル</button>
  </div>
</div>

<!-- 項目の追加・編集モーダル -->
<div class="mask" id="itemMask">
  <div class="sheet">
    <h3 id="itemTitle">項目を追加</h3>
    <div class="preview"><div class="btn" id="itemPreview"><span class="emo" id="pvIcon"></span><span class="nm" id="pvName">新しい項目</span></div></div>
    <div class="field">
      <label>名前</label>
      <input id="i_name" maxlength="8" placeholder="例：おくすり" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>アイコン（下から選ぶ／絵文字も入力可）</label>
      <div class="chips" id="iconChips"></div>
      <input id="i_icon" maxlength="8" placeholder="絵文字を直接入力してもOK" style="margin-top:8px;" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>背景色</label>
      <div class="chips" id="colorChips" style="margin-bottom:8px;"></div>
      <div class="row"><span style="font-size:13px;color:var(--sub)">自由に選ぶ：</span><input type="color" id="i_color" value="#5bc0de" style="width:54px;height:38px;padding:2px;" oninput="pickColor(this.value)"></div>
    </div>
    <div class="field">
      <label>選択ボタン（任意）</label>
      <div id="tagGroups"></div>
      <button type="button" class="addgrp" onclick="addTagGroup()">＋ 選択グループを追加</button>
      <div style="font-size:11px;color:var(--sub);margin-top:6px;">例）グループ名「色」＋選択肢「黄, 緑, 茶」と入れると、記録のときボタンで選べます</div>
    </div>
    <div class="toggle"><span>量（ml）を記録する</span><input type="checkbox" id="i_amount"></div>
    <div class="toggle"><span>メモを記録する</span><input type="checkbox" id="i_memo" checked></div>
    <button class="save" onclick="saveItem()">保存</button>
    <button class="danger" id="i_delete" style="display:none;" onclick="deleteItem()">この項目を削除</button>
    <button class="cancel" onclick="closeItem()">キャンセル</button>
  </div>
</div>

<!-- プロフィール設定モーダル -->
<div class="mask" id="profMask">
  <div class="sheet">
    <h3>👶 赤ちゃんの情報</h3>
    <div class="field">
      <label>名前</label>
      <input id="p_name_in" maxlength="12" placeholder="例：栞音">
    </div>
    <div class="field">
      <label>誕生日</label>
      <input type="date" id="p_birth_in">
    </div>
    <button class="save" onclick="saveProfile()">保存</button>
    <button class="cancel" onclick="closeProfile()">キャンセル</button>
  </div>
</div>

<script>
const REC_KEY='baby_tracker_v1';
const CFG_KEY='baby_tracker_items_v1';
const COLOR_NAME_MAP={'黄':'#f3d250','緑':'#7cc47c','茶':'#a0744b','赤':'#e8553e','黒':'#444','白':'#ffffff','オレンジ':'#f0ad4e','こげ茶':'#7a4a25'};
const DEFAULT_CFG=[
  {id:'pee',  name:'おしっこ', icon:'drop', color:'#86cfd6', amount:false, memo:true},
  {id:'food', name:'離乳食',   icon:'food', color:'#f4b870', amount:false, memo:true},
  {id:'poop', name:'うんち',   icon:'poop', color:'#b69172', amount:false, memo:true, alsoPee:true,
    tags:[
      {label:'色', options:['黄','緑','茶','赤','黒','白'], colors:COLOR_NAME_MAP},
      {label:'形状', options:['水っぽい','ゆるい','やわらかい','かたい']},
    ]},
  {id:'milk', name:'ミルク',   icon:'bottle', color:'#7ec8d8', amount:true,  memo:false},
];
// おしゃれな白線画アイコン（SVG）。1em表示で親のfont-size・色に追従
const _S='width="1em" height="1em" viewBox="0 0 24 24" style="vertical-align:-.14em;display:inline-block"';
const _ST='fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"';
const ICONS={
  bottle:`<svg ${_S} ${_ST}><path d="M10.5 2.5h3"/><path d="M9.9 4.5h4.2v2H9.9z"/><path d="M9.7 6.5h4.6c.5 0 .8.4.8.9l-.4 12.1a1.7 1.7 0 0 1-1.7 1.6h-2.1a1.7 1.7 0 0 1-1.7-1.6L8.9 7.4c0-.5.3-.9.8-.9z"/><path d="M9.5 10.4h2M9.5 12.9h2"/></svg>`,
  food:`<svg ${_S} ${_ST}><path d="M4 11h16"/><path d="M5.2 11a6.8 6.8 0 0 0 13.6 0"/><path d="M9 4.6c-.8.7-.8 1.7 0 2.4M12.5 4.6c-.8.7-.8 1.7 0 2.4"/></svg>`,
  poop:`<svg ${_S} fill="currentColor" style="vertical-align:-.14em;display:inline-block"><path d="M12 3.2c1.2 0 2.1.95 2.1 2.15 0 .4-.1.78-.3 1.1 1.6.12 2.85 1.2 2.85 2.55 0 .5-.18.96-.48 1.34C18 10.74 19.4 12 19.4 13.5c0 .58-.22 1.1-.6 1.52C20.1 15.4 21 16.4 21 17.6c0 1.6-1.66 2.72-3.7 2.72H6.7C4.66 20.32 3 19.2 3 17.6c0-1.2.9-2.2 2.2-2.58a2.2 2.2 0 0 1-.6-1.52C4.6 12 6 10.74 7.83 10.34a2 2 0 0 1-.48-1.34c0-1.35 1.25-2.43 2.85-2.55a2 2 0 0 1-.3-1.1C9.9 4.15 10.8 3.2 12 3.2z"/></svg>`,
  drop:`<svg ${_S} fill="currentColor" style="vertical-align:-.14em;display:inline-block"><path d="M12 3.2c.3 0 .57.13.75.36C14.2 5.4 18 10.3 18 13.8a6 6 0 0 1-12 0c0-3.5 3.8-8.4 5.25-10.24.18-.23.45-.36.75-.36z"/></svg>`,
  moon:`<svg ${_S} fill="currentColor" style="vertical-align:-.14em;display:inline-block"><path d="M20 14.7A8 8 0 1 1 9.3 4 6.5 6.5 0 0 0 20 14.7z"/></svg>`,
  sun:`<svg ${_S} ${_ST}><circle cx="12" cy="12" r="3.8"/><path d="M12 2.6v2.1M12 19.3v2.1M4.6 4.6 6 6M18 18l1.4 1.4M2.6 12h2.1M19.3 12h2.1M4.6 19.4 6 18M18 6l1.4-1.4"/></svg>`,
  thermo:`<svg ${_S} ${_ST}><path d="M14 14.5V5a2 2 0 1 0-4 0v9.5a4 4 0 1 0 4 0z"/><path d="M12 8.5v5.4"/></svg>`,
  pill:`<svg ${_S} ${_ST}><rect x="2.8" y="9" width="18.4" height="6" rx="3"/><path d="M12 9v6"/></svg>`,
  bath:`<svg ${_S} ${_ST}><path d="M3.5 12.5h17V14a4 4 0 0 1-4 4h-9a4 4 0 0 1-4-4z"/><path d="M6 12.5V6.3a1.8 1.8 0 0 1 3.2-1.1"/><path d="M5.2 18.4 4.5 20M18.8 18.4l.7 1.6"/></svg>`,
  heart:`<svg ${_S} fill="currentColor" style="vertical-align:-.14em;display:inline-block"><path d="M12 20.3l-1.45-1.32C5.4 14.36 2.5 11.72 2.5 8.5 2.5 6 4.5 4 7 4c1.54 0 3.04.72 4 1.86C11.96 4.72 13.46 4 15 4c2.5 0 4.5 2 4.5 4.5 0 3.22-2.9 5.86-8.05 10.48z"/></svg>`,
  ruler:`<svg ${_S} ${_ST}><rect x="3.5" y="8.5" width="17" height="7" rx="1.5"/><path d="M8 8.5v2.4M12 8.5v3.4M16 8.5v2.4"/></svg>`,
  scale:`<svg ${_S} ${_ST}><rect x="3.5" y="4" width="17" height="16" rx="3"/><path d="M12 8l2.1 3.1"/></svg>`,
  star:`<svg ${_S} fill="currentColor" style="vertical-align:-.14em;display:inline-block"><path d="M12 3.5l2.5 5.1 5.6.8-4 4 1 5.6-5-2.7-5 2.7 1-5.6-4-4 5.6-.8z"/></svg>`,
};
function iconHTML(ic){ return ICONS[ic] ? ICONS[ic] : '<span>'+escapeHtml(ic||'⭐')+'</span>'; }
const ICON_PRESETS=['bottle','food','poop','drop','moon','sun','thermo','pill','bath','heart','ruler','scale','star','🥛','🍴','🤱','👶','🧷','⏰','🚼'];

function loadJSON(k,def){ try{ const v=JSON.parse(localStorage.getItem(k)); return v==null?def:v; }catch(e){ return def; } }
function saveRec(){ localStorage.setItem(REC_KEY, JSON.stringify(data)); }

function live(){ return data.filter(d=>!d.deleted); }
function uid(p){ return (p||'')+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function cfgOf(id){ return cfg.find(c=>c.id==id) || {id, name:'(削除済)', icon:'❔', color:'#ccc'}; }

// ---- 表示整形 ----
function pad(n){ return n<10?'0'+n:''+n; }
function fmtSince(ms){
  if(ms<0) ms=0;
  const m=Math.floor(ms/60000), h=Math.floor(m/60), mm=m%60;
  if(h>=24){ return Math.floor(h/24)+'日前'; }
  if(h>0) return h+'時間'+(mm>0?mm+'分':'');
  return m+'分';
}
function fmtClock(ts){ const d=new Date(ts); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function fmtDay(ts){
  const d=new Date(ts), t=new Date();
  const same=(a,b)=>a.getFullYear()==b.getFullYear()&&a.getMonth()==b.getMonth()&&a.getDate()==b.getDate();
  const y=new Date(t); y.setDate(t.getDate()-1);
  const w=['日','月','火','水','木','金','土'][d.getDay()];
  if(same(d,t)) return '今日';
  if(same(d,y)) return '昨日';
  return (d.getMonth()+1)+'月'+d.getDate()+'日('+w+')';
}
function escapeHtml(s){ return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function textColor(hex){
  try{ const c=hex.replace('#',''); const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
    return ((r*299+g*587+b*114)/1000)>=150 ? '#5a4a1f' : '#fff'; }catch(e){ return '#fff'; }
}
function lastOf(id){ return live().filter(d=>d.type==id).sort((a,b)=>b.ts-a.ts)[0]; }
function lastAmount(id){ const r=live().filter(d=>d.type==id&&d.amount).sort((a,b)=>b.ts-a.ts)[0]; return r?r.amount:null; }

// ---- 日付関連 ----
let selDate = startOfDay(Date.now());
function startOfDay(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function sameDay(a,b){ return startOfDay(a)===startOfDay(b); }
function isToday(){ return selDate===startOfDay(Date.now()); }
function dayRecords(){ return live().filter(d=>sameDay(d.ts, selDate)).sort((a,b)=>a.ts-b.ts); }

function renderDateBar(){
  const d=new Date(selDate); const w=['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('dLabel').textContent = isToday() ? `今日 ${d.getMonth()+1}/${d.getDate()}(${w})` : `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${w})`;
  document.getElementById('dToday').style.visibility = isToday()?'hidden':'visible';
  document.getElementById('dNext').style.visibility = isToday()?'hidden':'visible';
}

// ---- 上部サマリー（その日の回数・合計＋経過） ----
function renderTimers(){
  const now=Date.now();
  const recs=dayRecords();
  document.getElementById('timers').innerHTML = cfg.filter(c=>!c.hidden).map(c=>{
    const mine=recs.filter(r=>r.type==c.id);
    const cnt=mine.length;
    let total=0; mine.forEach(r=>{ if(r.amount) total+=r.amount; });
    const totalStr = (c.amount && total>0) ? (' '+total+'ml') : '';
    let sub='';
    if(isToday()){
      const last=lastOf(c.id);
      sub = last ? (fmtSince(now-last.ts)+'前') : '記録なし';
    } else {
      const lastToday = mine[mine.length-1];
      sub = lastToday ? ('最後 '+fmtClock(lastToday.ts)) : '記録なし';
    }
    return `<div class="scard">
      <div class="sh"><span class="dot" style="background:${c.color}"></span>${escapeHtml(c.name)}</div>
      <div class="snum">${cnt}回<span style="font-size:11px;font-weight:600;color:var(--sub)">${totalStr}</span></div>
      <div class="ssub">${sub}</div></div>`;
  }).join('');
}

// ---- ボタン ----
function renderPad(){
  const p=document.getElementById('pad');
  let html=cfg.filter(c=>!c.hidden).map(c=>
    `<button class="btn" data-id="${c.id}" style="background:${c.color};color:${textColor(c.color)}">
      <span class="emo">${iconHTML(c.icon)}</span><span class="nm">${escapeHtml(c.name)}</span>
      ${editMode?'<span class="badge">✏️</span>':''}
    </button>`).join('');
  if(editMode) html+=`<button class="btn addtile" data-add="1">＋ 項目を追加</button>`;
  p.innerHTML=html;
}

// ---- その日の記録（時系列・昇順） ----
function renderLog(){
  const el=document.getElementById('log');
  const rows=dayRecords();
  if(rows.length==0){ el.innerHTML='<div class="empty">この日の記録はありません。<br>下のボタンから記録できます。</div>'; return; }
  let html='';
  for(const d of rows){
    const c=cfgOf(d.type);
    let parts=[];
    if(d.amount) parts.push(d.amount+'ml');
    if(d.tags) for(const k in d.tags) parts.push(escapeHtml(d.tags[k]));
    if(d.memo) parts.push(escapeHtml(d.memo));
    const sub=parts.join(' / ');
    html+=`<div class="item" data-rid="${d.id}">
      <div class="time" style="margin-right:2px">${fmtClock(d.ts)}</div>
      <div class="ic" style="color:${c.color}">${iconHTML(c.icon)}</div>
      <div class="main" onclick="editRecord('${d.id}')"><div class="t1">${escapeHtml(c.name)}</div>${sub?`<div class="t2">${sub}</div>`:''}</div>
      <button class="del" onclick="delRecord('${d.id}')">×</button></div>`;
  }
  el.innerHTML=html;
}
function renderAll(){ renderDateBar(); renderTimers(); renderPad(); renderLog(); }

function calcAge(birth){
  if(!birth) return '';
  const b=new Date(birth+'T00:00:00'), n=new Date();
  if(isNaN(b)) return '';
  let months=(n.getFullYear()-b.getFullYear())*12 + (n.getMonth()-b.getMonth());
  let days=n.getDate()-b.getDate();
  if(days<0){ months--; const pm=new Date(n.getFullYear(),n.getMonth(),0).getDate(); days+=pm; }
  const years=Math.floor(months/12); months=months%12;
  return `${years}歳${months}ヶ月${days}日`;
}

// ============ 記録モーダル ============
// 日時を「日付・時・分」の3分割で選ぶ
function buildDateTime(ts){
  const d=new Date(ts);
  const today=startOfDay(Date.now());
  let dh='';
  for(let i=-30;i<=2;i++){
    const dd=new Date(today); dd.setDate(dd.getDate()+i); const t=dd.getTime();
    const w=['日','月','火','水','木','金','土'][dd.getDay()];
    let lb = i===0?'今日': i===-1?'昨日': i===1?'明日': (dd.getMonth()+1)+'月'+dd.getDate()+'日('+w+')';
    dh+=`<option value="${t}" ${t===startOfDay(ts)?'selected':''}>${lb}</option>`;
  }
  document.getElementById('f_date').innerHTML=dh;
  let hh=''; for(let h=0;h<24;h++) hh+=`<option value="${h}" ${h===d.getHours()?'selected':''}>${h}時</option>`;
  document.getElementById('f_hour').innerHTML=hh;
  let mm=''; for(let m=0;m<60;m++) mm+=`<option value="${m}" ${m===d.getMinutes()?'selected':''}>${m}分</option>`;
  document.getElementById('f_min').innerHTML=mm;
}

function buildAmount(selected){
  const arr=[...ML_BASE];
  if(selected && !arr.includes(selected)) arr.push(selected);
  arr.sort((a,b)=>a-b);
  let h=arr.map(v=>`<option value="${v}" ${v==selected?'selected':''}>${v} ml</option>`).join('');
  h+=`<option value="other">その他…</option>`;
  document.getElementById('f_amount_sel').innerHTML=h;
}
function lastMilkText(){
  const m=lastOf('milk');
  if(!m) return '';
  return iconHTML('bottle')+' 前回のミルクから '+fmtSince(Date.now()-m.ts)+'（'+fmtClock(m.ts)+'）';
}
function openRecord(id){
  recEditId=null; recType=id;
  const c=cfgOf(id);
  document.getElementById('recTitle').innerHTML=iconHTML(c.icon)+' '+escapeHtml(c.name)+'を記録';
  const lm=document.getElementById('lastMilkLine');
  const t=lastMilkText(); lm.style.display=(t&&isToday())?'block':'none'; lm.innerHTML=t;
  // 既定は「今」。過去の日を見ているときはその日付＋現在時刻
  let def=Date.now();
  if(!isToday()){ const now=new Date(); const dt=new Date(selDate); dt.setHours(now.getHours(),now.getMinutes(),0,0); def=dt.getTime(); }
  buildDateTime(def);
  setupRecFields(c, {});
  document.getElementById('recMask').classList.add('on');
}
function editRecord(id){
  const d=data.find(x=>x.id==id); if(!d) return;
  recEditId=id; recType=d.type;
  const c=cfgOf(d.type);
  document.getElementById('recTitle').innerHTML=iconHTML(c.icon)+' '+escapeHtml(c.name)+'を編集';
  const lm=document.getElementById('lastMilkLine'); lm.style.display='none';
  buildDateTime(d.ts);
  setupRecFields(c, d);
  document.getElementById('recMask').classList.add('on');
}
function setupRecFields(c, d){
  const aF=document.getElementById('amountField'), mF=document.getElementById('memoField');
  if(c.amount){
    aF.style.display='block';
    const def = d.amount || lastAmount(c.id) || 120;
    buildAmount(def);
    const num=document.getElementById('f_amount_num'); num.style.display='none'; num.value=d.amount||'';
  } else aF.style.display='none';
  // 選択ボタン（タグ）
  recTagsSel = d.tags ? {...d.tags} : {};
  renderRecTags(c);
  // おしっこも記録する
  const pF=document.getElementById('alsoPeeField');
  if(c.alsoPee){ pF.style.display='flex'; document.getElementById('f_alsoPee').checked=false; }
  else pF.style.display='none';
  if(c.memo){
    mF.style.display='block';
    document.getElementById('memoLabel').textContent='メモ';
    document.getElementById('f_memo').value=d.memo||'';
  } else mF.style.display='none';
}
function renderRecTags(c){
  const wrap=document.getElementById('tagsArea');
  if(!c.tags||!c.tags.length){ wrap.style.display='none'; wrap.innerHTML=''; return; }
  wrap.style.display='block';
  wrap.innerHTML = c.tags.map((g,gi)=>{
    const chips=g.options.map((opt,oi)=>{
      const sel = recTagsSel[g.label]===opt;
      if(g.colors && g.colors[opt]){
        const col=g.colors[opt];
        return `<span class="cchip${sel?' sel':''}" data-g="${gi}" data-o="${oi}" style="background:${col};color:${textColor(col)}">${escapeHtml(opt)}</span>`;
      }
      return `<span class="tchip${sel?' sel':''}" data-g="${gi}" data-o="${oi}">${escapeHtml(opt)}</span>`;
    }).join('');
    return `<div class="field"><label>${escapeHtml(g.label)}</label><div class="chips">${chips}</div></div>`;
  }).join('');
}
document.getElementById('tagsArea').addEventListener('click',e=>{
  const chip=e.target.closest('[data-g]'); if(!chip) return;
  const c=cfgOf(recType); const g=c.tags[+chip.getAttribute('data-g')];
  const opt=g.options[+chip.getAttribute('data-o')];
  if(recTagsSel[g.label]===opt) delete recTagsSel[g.label]; else recTagsSel[g.label]=opt;
  renderRecTags(c);
});
document.getElementById('f_amount_sel').addEventListener('change',e=>{
  document.getElementById('f_amount_num').style.display = e.target.value=='other'?'block':'none';
});
function calcTs(){
  const day=parseInt(document.getElementById('f_date').value);
  const h=parseInt(document.getElementById('f_hour').value);
  const m=parseInt(document.getElementById('f_min').value);
  if(isNaN(day)) return null;
  return day + h*3600000 + m*60000;
}
function saveRecord(){
  const ts=calcTs();
  if(ts==null){ alert('日時を入力してください'); return; }
  const c=cfgOf(recType);
  let amount=null;
  if(c.amount){
    const sel=document.getElementById('f_amount_sel').value;
    amount = sel=='other' ? (parseInt(document.getElementById('f_amount_num').value)||null) : parseInt(sel);
  }
  const memo = c.memo ? document.getElementById('f_memo').value.trim() : '';
  const tags = (c.tags&&c.tags.length&&Object.keys(recTagsSel).length) ? {...recTagsSel} : null;
  const rec={ id:recEditId||uid('r'), type:recType, ts, amount, memo, tags, updated:Date.now(), deleted:false, _dirty:true };
  if(recEditId) data=data.map(x=>x.id==recEditId?rec:x); else data.push(rec);
  // 「おしっこも記録する」が ON なら同時刻でおしっこも追加（新規時のみ）
  if(!recEditId && c.alsoPee && document.getElementById('f_alsoPee').checked){
    data.push({ id:uid('r'), type:'pee', ts, amount:null, memo:'', tags:null, updated:Date.now(), deleted:false, _dirty:true });
  }
  saveRec(); renderAll(); closeRec(); scheduleSync();
}
function delRecord(id){
  if(!confirm('この記録を削除しますか？')) return;
  const apply=()=>{ data=data.map(x=>x.id==id?{...x,deleted:true,updated:Date.now(),_dirty:true}:x); saveRec(); renderAll(); scheduleSync(); };
  // 一覧の該当行をぬるっと畳んでから削除
  const row=[...document.querySelectorAll('#log .item')].find(el=>el.getAttribute('data-rid')===id);
  if(row){ row.classList.add('removing'); setTimeout(apply,250); } else apply();
}

// ============ 並べ替え（長押しドラッグ）＋タップ ============
const padEl=document.getElementById('pad');
let drag=null;
padEl.addEventListener('pointerdown',e=>{
  const add=e.target.closest('[data-add]');
  if(add){ drag={add:true}; return; }
  const tile=e.target.closest('[data-id]');
  if(!tile) return;
  drag={ id:tile.getAttribute('data-id'), el:tile, sx:e.clientX, sy:e.clientY, pid:e.pointerId, active:false, moved:false, timer:null };
  drag.timer=setTimeout(()=>{
    if(!drag) return;
    drag.active=true;
    const el=drag.el, r=el.getBoundingClientRect();
    drag.gx=drag.sx-r.left; drag.gy=drag.sy-r.top;
    el.classList.add('dragging');
    el.style.transition='none'; el.style.willChange='transform'; el.style.zIndex='6';
    el.style.pointerEvents='none';
    padEl.classList.add('dragging-active');
    try{ padEl.setPointerCapture(drag.pid); }catch(_){}
    if(navigator.vibrate) navigator.vibrate(12);
    moveDragged(drag.sx, drag.sy);
  },320);
});
function moveDragged(cx,cy){
  const el=drag.el; el.style.transform='';
  const b=el.getBoundingClientRect();
  el.style.transform=`translate(${cx-drag.gx-b.left}px,${cy-drag.gy-b.top}px) scale(1.05)`;
}
function flipReorder(cx,cy){
  const el=drag.el;
  const under=document.elementFromPoint(cx,cy);
  const tile=under&&under.closest('[data-id]');
  if(!tile||tile===el) return;
  const others=[...padEl.querySelectorAll('[data-id]')].filter(t=>t!==el);
  const firsts=others.map(t=>[t,t.getBoundingClientRect()]);
  const r=tile.getBoundingClientRect();
  const after=(cy>r.top+r.height/2)||(Math.abs(cy-(r.top+r.height/2))<6 && cx>r.left+r.width/2);
  if(after) tile.after(el); else padEl.insertBefore(el,tile);
  drag.moved=true;
  firsts.forEach(([t,f])=>{
    const l=t.getBoundingClientRect();
    const dx=f.left-l.left, dy=f.top-l.top;
    if(dx||dy){ t.style.transition='none'; t.style.transform=`translate(${dx}px,${dy}px)`;
      requestAnimationFrame(()=>{ t.style.transition='transform .2s cubic-bezier(.2,.8,.2,1)'; t.style.transform=''; }); }
  });
}
padEl.addEventListener('pointermove',e=>{
  if(!drag||drag.add) return;
  if(!drag.active){
    if(Math.abs(e.clientX-drag.sx)>10||Math.abs(e.clientY-drag.sy)>10){ clearTimeout(drag.timer); drag=null; }
    return;
  }
  e.preventDefault();
  flipReorder(e.clientX,e.clientY);
  moveDragged(e.clientX,e.clientY);
},{passive:false});
function cleanupDragEl(el){ el.classList.remove('dragging'); el.style.zIndex=''; el.style.willChange=''; el.style.transition=''; el.style.transform=''; el.style.pointerEvents=''; }
function endDrag(e){
  if(!drag) return;
  if(drag.add){ drag=null; openAddItem(); return; }
  clearTimeout(drag.timer);
  const d=drag; drag=null;
  padEl.classList.remove('dragging-active');
  if(d.active){
    const el=d.el;
    try{ padEl.releasePointerCapture(d.pid); }catch(_){}
    el.style.transition='transform .24s cubic-bezier(.2,.85,.25,1), box-shadow .2s';
    el.style.transform='';
    setTimeout(()=>cleanupDragEl(el),240);
    if(d.moved||orderChanged()) saveOrder();
    return;   // 長押し（移動なし）は何もしない＝誤タップ防止
  }
  if(editMode) openItemEdit(d.id); else openRecord(d.id);
}
padEl.addEventListener('pointerup',endDrag);
padEl.addEventListener('pointercancel',e=>{ if(!drag) return; if(drag.timer) clearTimeout(drag.timer); padEl.classList.remove('dragging-active'); if(drag.el) cleanupDragEl(drag.el); drag=null; });
function currentOrder(){ return [...padEl.querySelectorAll('[data-id]')].map(el=>el.getAttribute('data-id')); }
function orderChanged(){ const ids=currentOrder(); const vis=cfg.filter(c=>!c.hidden).map(c=>c.id); return ids.join(',')!==vis.join(','); }
function saveOrder(){
  const ids=currentOrder();
  const visible=ids.map(id=>cfg.find(c=>c.id==id)).filter(Boolean);
  const hidden=cfg.filter(c=>c.hidden);
  cfg=[...visible,...hidden]; saveCfg(); renderTimers(); scheduleSync();
}

// ---- マスク外タップで閉じる ----
document.getElementById('recMask').addEventListener('click',e=>{ if(e.target.id=='recMask') closeRec(); });
document.getElementById('itemMask').addEventListener('click',e=>{ if(e.target.id=='itemMask') closeItem(); });

// ============ 自動同期（合言葉なし・URLを知っている人で共有）============
let syncTimer=null, syncing=false;
function scheduleSync(){ if(!sync.url) return; clearTimeout(syncTimer); syncTimer=setTimeout(()=>doSync(false),1200); }
async function doSync(initial){
  if(!sync.url||syncing) return false;
  syncing=true; updateSyncStatus('同期中…');
  try{
    const out=data.filter(d=>d._dirty).map(stripRec);
    if(cfgDirty){ out.push({ id:'__config__', type:'__config__', ts:0, amount:null, memo:JSON.stringify(cfg), tags:null, updated:cfgUpdated||Date.now(), deleted:false }); }
    const res=await fetch(sync.url,{ method:'POST', body: JSON.stringify({ since:sync.since||0, records:out }) });
    const j=await res.json();
    if(!j.ok){ updateSyncStatus('同期エラー'); syncing=false; return false; }
    // サーバーからの変更を取り込む
    let changed=false;
    for(const r of (j.records||[])){
      if(r.id=='__config__'){
        if(!cfgDirty){ try{ cfg=JSON.parse(r.memo); cfgUpdated=Number(r.updated)||cfgUpdated; localStorage.setItem(CFG_KEY,JSON.stringify(cfg)); localStorage.setItem('baby_tracker_cfg_updated',JSON.stringify(cfgUpdated)); changed=true; }catch(_){} }
        continue;
      }
      const idx=data.findIndex(x=>x.id==r.id);
      const rec={ id:r.id, type:r.type, ts:Number(r.ts), amount:r.amount===''||r.amount==null?null:Number(r.amount), memo:r.memo||'', tags:r.tags||null, updated:Number(r.updated)||0, deleted:!!r.deleted, _dirty:false };
      if(idx>=0) data[idx]=rec; else data.push(rec);
      changed=true;
    }
    // 送信済みフラグを解除
    data.forEach(d=>{ d._dirty=false; });
    cfgDirty=false;
    sync.since=Number(j.serverTime)||sync.since;
    sync.last=Date.now();
    saveRec(); saveSync();
    if(changed) renderAll();
    updateSyncStatus();
    syncing=false; return true;
  }catch(err){ updateSyncStatus('通信できません'); syncing=false; return false; }
}
function stripRec(d){ return { id:d.id, type:d.type, ts:d.ts, amount:d.amount, memo:d.memo, tags:d.tags, updated:d.updated, deleted:!!d.deleted }; }
function updateSyncStatus(tmp){
  const el=document.getElementById('syncStatus');
  if(!sync.url){ el.style.display='none'; return; }
  el.style.display='block';
  if(tmp){ el.textContent='🔄 '+tmp; return; }
  el.textContent = sync.last ? ('☁︎ 同期済み '+fmtClock(sync.last)) : '☁︎ 共有オン';
}

// ---- 起動 ----
function tick(){
  // 日付が変わっていたら（今日表示中なら）選択日を更新
  if(isToday() && selDate!==startOfDay(Date.now())){ selDate=startOfDay(Date.now()); }
  renderDateBar(); renderTimers();
}
// 自動共有：合言葉なしで全員が同じ部屋を共有。初回/旧バージョンからは全件アップして同期し直す
if(sync.v!==2){ sync={url:DEFAULT_SYNC_URL, since:0, last:0, v:2}; data.forEach(d=>d._dirty=true); cfgDirty=true; saveSync(); }
renderProfile(); renderAll(); setInterval(tick,30000); updateSyncStatus();
doSync(false); setInterval(()=>{ if(!document.hidden) doSync(false); }, 20000); window.addEventListener('focus',()=>doSync(false));
</script>
